<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="anchor">
        <div class="container">
            <div class="column" id="c1">
                <h3>HOME</h3>
                <div class="score" id="s1">0</div>
                <div class="btn-wrapper">
                    <button id="1home" onclick="addHome(1)">+1</button>
                    <button id="2home" onclick="addHome(2)">+2</button>
                    <button id="3home" onclick="addHome(3)">+3</button>
                </div>
            </div>
            <div  class="column" id="c2">
                <h3>AWAY</h3>
                <div class="score" id="s2">0</div>
                <div class="btn-wrapper">
                    <button id="1guest" onclick="addGuest(1)">+1</button>
                    <button id="2guest" onclick="addGuest(2)">+2</button>
                    <button id="3guest" onclick="addGuest(3)">+3</button>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
        <div class="bottom-btn-wrapper">
            <button onclick="newGame()">New game</button>
        </div>
        </div>
    </body>
</html>
